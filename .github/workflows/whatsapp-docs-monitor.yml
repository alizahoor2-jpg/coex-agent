name: WhatsApp Docs Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install beautifulsoup4 requests
        
      - name: Run monitor
        run: python whatsapp-docs-monitor/monitor.py
        
      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add whatsapp-docs-monitor/stored_page.txt 2>/dev/null || exit 0
          git commit -m "Update stored page" 2>/dev/null || exit 0
          git push || echo "No changes to push"